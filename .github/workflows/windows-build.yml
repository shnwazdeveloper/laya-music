name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Laya Music
        run: pnpm --filter @nuclearplayer/player tauri build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: laya-music-windows
          path: |
            packages/player/src-tauri/target/release/bundle/nsis/*.exe
            packages/player/src-tauri/target/release/bundle/msi/*.msi

      - name: Publish Windows release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "laya-music-windows-latest"

          gh release delete $tag --yes --cleanup-tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Removed existing $tag release."
          } else {
            Write-Host "No existing $tag release to replace."
          }

          $assets = @(
            Get-ChildItem "packages/player/src-tauri/target/release/bundle/nsis/*.exe"
            Get-ChildItem "packages/player/src-tauri/target/release/bundle/msi/*.msi"
          ) | ForEach-Object { $_.FullName }

          gh release create $tag @assets `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Laya Music Windows" `
            --notes "Automated Windows installer build for Laya Music." `
            --latest
