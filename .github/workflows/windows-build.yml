name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Laya Music
        run: pnpm --filter @nuclearplayer/player tauri build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: laya-music-windows
          path: |
            packages/player/src-tauri/target/release/bundle/nsis/*.exe
            packages/player/src-tauri/target/release/bundle/msi/*.msi
